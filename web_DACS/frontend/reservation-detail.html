<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3TA — Chi tiết đặt bàn</title>
  <link rel="stylesheet" href="css/shared.css"" />
  <style>

    /* ── Page ────────────────────────────────────────────── */
    .detail-page {
      padding-top: calc(var(--navbar-height) + var(--space-10));
      padding-bottom: var(--space-20);
      min-height: 100vh;
      position: relative;
    }

    .detail-page::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 60% 50% at 80% 10%, rgba(14,77,110,0.2) 0%, transparent 60%),
        radial-gradient(ellipse 40% 50% at 10% 80%, rgba(26,122,138,0.1) 0%, transparent 55%);
    }

    .detail-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 var(--space-8);
      position: relative;
      z-index: 1;
    }

    /* ── Breadcrumb ──────────────────────────────────────── */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-sm);
      color: var(--text-muted);
      margin-bottom: var(--space-8);
      animation: slideUp 0.4s ease both;
    }

    .breadcrumb a { color: var(--text-muted); transition: color var(--transition-fast); }
    .breadcrumb a:hover { color: var(--accent-primary); }
    .breadcrumb__sep { color: var(--border-active); }
    .breadcrumb__current { color: var(--text-secondary); }

    /* ── Order Header Card ───────────────────────────────── */
    .order-header {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      padding: var(--space-8);
      margin-bottom: var(--space-6);
      position: relative;
      overflow: hidden;
      animation: slideUp 0.45s ease 0.05s both;
    }

    /* Decorative ocean stripe */
    .order-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--color-ocean), var(--color-teal), var(--color-wave), var(--color-foam));
    }

    .order-header__top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-6);
      margin-bottom: var(--space-6);
      flex-wrap: wrap;
    }

    .order-id-wrap { display: flex; align-items: center; gap: var(--space-3); }

    .order-id-badge {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: var(--space-2) var(--space-4);
      color: var(--text-muted);
      letter-spacing: 0.06em;
    }

    .order-title {
      font-family: var(--font-display);
      font-size: var(--text-3xl);
      font-weight: 300;
      line-height: 1.1;
      color: var(--text-primary);
    }

    .order-title em { font-style: italic; color: var(--accent-primary); }

    .order-status-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: var(--space-3);
      flex-shrink: 0;
    }

    /* Info grid */
    .order-info-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border-subtle);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .info-cell {
      background: var(--bg-surface);
      padding: var(--space-5) var(--space-5);
    }

    .info-cell__label {
      font-size: var(--text-xs);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: var(--space-2);
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .info-cell__value {
      font-size: var(--text-md);
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.3;
    }

    .info-cell__value--accent {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      color: var(--accent-primary);
    }

    /* ── Status Timeline ─────────────────────────────────── */
    .timeline-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      padding: var(--space-6) var(--space-8);
      margin-bottom: var(--space-6);
      animation: slideUp 0.45s ease 0.1s both;
    }

    .timeline-card__title {
      font-size: var(--text-xs);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: var(--space-6);
    }

    .timeline {
      display: flex;
      align-items: center;
      gap: 0;
      position: relative;
    }

    .tl-step {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    /* Connector line between steps */
    .tl-step:not(:last-child)::after {
      content: '';
      position: absolute;
      top: 16px;
      left: 50%;
      width: 100%;
      height: 2px;
      background: var(--border-subtle);
      z-index: 0;
    }

    .tl-step.done:not(:last-child)::after {
      background: linear-gradient(90deg, var(--color-teal), var(--color-wave));
    }

    .tl-dot {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 2px solid var(--border-subtle);
      background: var(--bg-surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      position: relative;
      z-index: 1;
      transition: all var(--transition-base);
      flex-shrink: 0;
    }

    .tl-step.done .tl-dot {
      background: linear-gradient(135deg, var(--color-teal), var(--color-wave));
      border-color: var(--color-wave);
      box-shadow: 0 0 14px rgba(42,171,184,0.35);
    }

    .tl-step.active .tl-dot {
      border-color: var(--accent-primary);
      background: rgba(42,171,184,0.1);
      box-shadow: 0 0 0 4px rgba(42,171,184,0.15);
      animation: pulse-glow 2s ease infinite;
    }

    .tl-step.cancelled .tl-dot {
      background: rgba(224,92,92,0.1);
      border-color: var(--status-occupied);
    }

    .tl-label {
      font-size: var(--text-xs);
      color: var(--text-muted);
      margin-top: var(--space-3);
      text-align: center;
      line-height: 1.4;
      max-width: 80px;
    }

    .tl-step.done   .tl-label { color: var(--accent-primary); }
    .tl-step.active .tl-label { color: var(--text-secondary); font-weight: 500; }

    .tl-time {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: var(--space-1);
      text-align: center;
      font-family: var(--font-mono);
    }

    /* ── Dishes Table Card ───────────────────────────────── */
    .dishes-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      overflow: hidden;
      margin-bottom: var(--space-6);
      animation: slideUp 0.45s ease 0.15s both;
    }

    .dishes-card__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-5) var(--space-6);
      border-bottom: 1px solid var(--border-subtle);
      background: var(--bg-surface);
    }

    .dishes-card__title {
      font-family: var(--font-display);
      font-size: var(--text-lg);
      font-weight: 400;
    }

    .dishes-card__count {
      font-size: var(--text-xs);
      color: var(--text-muted);
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-full);
      padding: 2px 10px;
    }

    /* Dish rows */
    .dish-item {
      display: flex;
      align-items: center;
      gap: var(--space-5);
      padding: var(--space-5) var(--space-6);
      border-bottom: 1px solid var(--border-subtle);
      transition: background var(--transition-fast);
    }

    .dish-item:last-child { border-bottom: none; }
    .dish-item:hover { background: rgba(42,171,184,0.025); }

    .dish-item__img {
      width: 58px; height: 58px;
      border-radius: var(--radius-md);
      object-fit: cover;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      overflow: hidden;
    }

    .dish-item__img img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .dish-item__info { flex: 1; min-width: 0; }

    .dish-item__name {
      font-size: var(--text-base);
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dish-item__unit {
      font-size: var(--text-xs);
      color: var(--text-muted);
    }

    .dish-item__qty-col {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      flex-shrink: 0;
    }

    .qty-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px; height: 32px;
      border-radius: var(--radius-md);
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--text-primary);
    }

    .dish-item__unit-price {
      font-size: var(--text-xs);
      color: var(--text-muted);
      flex-shrink: 0;
      min-width: 80px;
      text-align: right;
    }

    .dish-item__subtotal {
      font-family: var(--font-display);
      font-size: var(--text-lg);
      color: var(--text-primary);
      flex-shrink: 0;
      min-width: 110px;
      text-align: right;
    }

    /* Summary footer */
    .dishes-footer {
      padding: var(--space-5) var(--space-6);
      border-top: 1px solid var(--border-subtle);
      background: var(--bg-surface);
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-2) 0;
      font-size: var(--text-sm);
      color: var(--text-muted);
    }

    .summary-row--total {
      padding-top: var(--space-4);
      margin-top: var(--space-2);
      border-top: 1px solid var(--border-subtle);
    }

    .summary-row--total .summary-row__label {
      font-size: var(--text-base);
      color: var(--text-primary);
      font-weight: 500;
    }

    .summary-row--total .summary-row__value {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      color: var(--accent-primary);
    }

    /* ── Action Bar ──────────────────────────────────────── */
    .action-bar {
      display: flex;
      gap: var(--space-4);
      align-items: center;
      flex-wrap: wrap;
      animation: slideUp 0.45s ease 0.2s both;
    }

    .action-bar__right { margin-left: auto; display: flex; gap: var(--space-3); }

    /* ── Error / Skeleton states ─────────────────────────── */
    .page-error {
      text-align: center;
      padding: var(--space-20);
    }

    .page-error__code {
      font-family: var(--font-display);
      font-size: 6rem;
      font-weight: 300;
      color: var(--border-active);
      line-height: 1;
    }

    .page-error__msg {
      font-size: var(--text-lg);
      color: var(--text-muted);
      margin-top: var(--space-4);
    }

    .skeleton-block {
      border-radius: var(--radius-lg);
      margin-bottom: var(--space-5);
    }

    /* ── Print styles ────────────────────────────────────── */
    @media print {
      .navbar, .action-bar, .breadcrumb { display: none !important; }
      .detail-page { padding-top: var(--space-6); }
      .detail-page::before { display: none; }
      body { background: white; color: black; }
      .order-header, .dishes-card, .timeline-card {
        box-shadow: none;
        border: 1px solid #ddd;
      }
    }

    @media (max-width: 768px) {
      .order-info-grid { grid-template-columns: 1fr 1fr; }
      .order-title     { font-size: var(--text-2xl); }
      .dish-item__unit-price { display: none; }
      .timeline        { gap: 0; }
      .tl-label        { font-size: 10px; max-width: 60px; }
    }

    @media (max-width: 520px) {
      .order-info-grid { grid-template-columns: 1fr; }
      .dish-item__img  { width: 44px; height: 44px; }
      .action-bar      { flex-direction: column; align-items: stretch; }
      .action-bar__right { margin-left: 0; }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="navbar__brand" style="text-decoration:none">
      <span style="font-size:1.4rem">🌊</span>
      3<span class="accent">T</span>A
    </a>
    <ul class="navbar__nav">
      <li><a href="index.html">Trang chủ</a></li>
      <li><a href="index.html#menu">Thực đơn</a></li>
      <li><a href="profile.html">Tài khoản</a></li>
    </ul>
    <div class="navbar__actions" id="navbar-actions"></div>
  </nav>

  <div class="detail-page">
    <div class="detail-container" id="page-root">
      <!-- Component renders here (skeleton → content or error) -->
    </div>
  </div>

  <div class="toast-container"></div>

  <script type="module">
    import ReservationDetailComponent from './components/ReservationDetailComponent.js';

    // ── Auth guard ─────────────────────────────────────────
    import { Auth } from './js/services/authService.js';
    if (!Auth.isLoggedIn()) {
      window.location.href = 'login.html';
    }

    // ── Navbar ─────────────────────────────────────────────
    const username = Auth.getUsername() || 'User';
    const initial  = username.charAt(0).toUpperCase();
    document.getElementById('navbar-actions').innerHTML = `
      <div style="display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-4);border-radius:var(--radius-full);border:1px solid var(--border-subtle);font-size:var(--text-sm);color:var(--text-secondary);background:var(--bg-surface)">
        <div style="width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--color-teal),var(--color-wave));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--color-deep)">${initial}</div>
        ${username}
      </div>
      ${Auth.isAdmin() ? `<a href="admin.html" class="btn btn-ghost btn-sm">Admin ↗</a>` : ''}
    `;
    const comp = new ReservationDetailComponent('#page-root');
    comp.init();
  </script>
</body>
</html>
