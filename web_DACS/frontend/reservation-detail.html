<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3TA — Chi tiết đặt bàn</title>
  <link rel="stylesheet" href="css/shared.css"" />
  <style>

    /* ── Page ────────────────────────────────────────────── */
    .detail-page {
      padding-top: calc(var(--navbar-height) + var(--space-10));
      padding-bottom: var(--space-20);
      min-height: 100vh;
      position: relative;
    }

    .detail-page::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 60% 50% at 80% 10%, rgba(14,77,110,0.2) 0%, transparent 60%),
        radial-gradient(ellipse 40% 50% at 10% 80%, rgba(26,122,138,0.1) 0%, transparent 55%);
    }

    .detail-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 var(--space-8);
      position: relative;
      z-index: 1;
    }

    /* ── Breadcrumb ──────────────────────────────────────── */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-sm);
      color: var(--text-muted);
      margin-bottom: var(--space-8);
      animation: slideUp 0.4s ease both;
    }

    .breadcrumb a { color: var(--text-muted); transition: color var(--transition-fast); }
    .breadcrumb a:hover { color: var(--accent-primary); }
    .breadcrumb__sep { color: var(--border-active); }
    .breadcrumb__current { color: var(--text-secondary); }

    /* ── Order Header Card ───────────────────────────────── */
    .order-header {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      padding: var(--space-8);
      margin-bottom: var(--space-6);
      position: relative;
      overflow: hidden;
      animation: slideUp 0.45s ease 0.05s both;
    }

    /* Decorative ocean stripe */
    .order-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--color-ocean), var(--color-teal), var(--color-wave), var(--color-foam));
    }

    .order-header__top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-6);
      margin-bottom: var(--space-6);
      flex-wrap: wrap;
    }

    .order-id-wrap { display: flex; align-items: center; gap: var(--space-3); }

    .order-id-badge {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: var(--space-2) var(--space-4);
      color: var(--text-muted);
      letter-spacing: 0.06em;
    }

    .order-title {
      font-family: var(--font-display);
      font-size: var(--text-3xl);
      font-weight: 300;
      line-height: 1.1;
      color: var(--text-primary);
    }

    .order-title em { font-style: italic; color: var(--accent-primary); }

    .order-status-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: var(--space-3);
      flex-shrink: 0;
    }

    /* Info grid */
    .order-info-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border-subtle);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .info-cell {
      background: var(--bg-surface);
      padding: var(--space-5) var(--space-5);
    }

    .info-cell__label {
      font-size: var(--text-xs);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: var(--space-2);
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .info-cell__value {
      font-size: var(--text-md);
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.3;
    }

    .info-cell__value--accent {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      color: var(--accent-primary);
    }

    /* ── Status Timeline ─────────────────────────────────── */
    .timeline-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      padding: var(--space-6) var(--space-8);
      margin-bottom: var(--space-6);
      animation: slideUp 0.45s ease 0.1s both;
    }

    .timeline-card__title {
      font-size: var(--text-xs);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: var(--space-6);
    }

    .timeline {
      display: flex;
      align-items: center;
      gap: 0;
      position: relative;
    }

    .tl-step {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    /* Connector line between steps */
    .tl-step:not(:last-child)::after {
      content: '';
      position: absolute;
      top: 16px;
      left: 50%;
      width: 100%;
      height: 2px;
      background: var(--border-subtle);
      z-index: 0;
    }

    .tl-step.done:not(:last-child)::after {
      background: linear-gradient(90deg, var(--color-teal), var(--color-wave));
    }

    .tl-dot {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 2px solid var(--border-subtle);
      background: var(--bg-surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      position: relative;
      z-index: 1;
      transition: all var(--transition-base);
      flex-shrink: 0;
    }

    .tl-step.done .tl-dot {
      background: linear-gradient(135deg, var(--color-teal), var(--color-wave));
      border-color: var(--color-wave);
      box-shadow: 0 0 14px rgba(42,171,184,0.35);
    }

    .tl-step.active .tl-dot {
      border-color: var(--accent-primary);
      background: rgba(42,171,184,0.1);
      box-shadow: 0 0 0 4px rgba(42,171,184,0.15);
      animation: pulse-glow 2s ease infinite;
    }

    .tl-step.cancelled .tl-dot {
      background: rgba(224,92,92,0.1);
      border-color: var(--status-occupied);
    }

    .tl-label {
      font-size: var(--text-xs);
      color: var(--text-muted);
      margin-top: var(--space-3);
      text-align: center;
      line-height: 1.4;
      max-width: 80px;
    }

    .tl-step.done   .tl-label { color: var(--accent-primary); }
    .tl-step.active .tl-label { color: var(--text-secondary); font-weight: 500; }

    .tl-time {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: var(--space-1);
      text-align: center;
      font-family: var(--font-mono);
    }

    /* ── Dishes Table Card ───────────────────────────────── */
    .dishes-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      overflow: hidden;
      margin-bottom: var(--space-6);
      animation: slideUp 0.45s ease 0.15s both;
    }

    .dishes-card__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-5) var(--space-6);
      border-bottom: 1px solid var(--border-subtle);
      background: var(--bg-surface);
    }

    .dishes-card__title {
      font-family: var(--font-display);
      font-size: var(--text-lg);
      font-weight: 400;
    }

    .dishes-card__count {
      font-size: var(--text-xs);
      color: var(--text-muted);
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-full);
      padding: 2px 10px;
    }

    /* Dish rows */
    .dish-item {
      display: flex;
      align-items: center;
      gap: var(--space-5);
      padding: var(--space-5) var(--space-6);
      border-bottom: 1px solid var(--border-subtle);
      transition: background var(--transition-fast);
    }

    .dish-item:last-child { border-bottom: none; }
    .dish-item:hover { background: rgba(42,171,184,0.025); }

    .dish-item__img {
      width: 58px; height: 58px;
      border-radius: var(--radius-md);
      object-fit: cover;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      overflow: hidden;
    }

    .dish-item__img img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .dish-item__info { flex: 1; min-width: 0; }

    .dish-item__name {
      font-size: var(--text-base);
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dish-item__unit {
      font-size: var(--text-xs);
      color: var(--text-muted);
    }

    .dish-item__qty-col {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      flex-shrink: 0;
    }

    .qty-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px; height: 32px;
      border-radius: var(--radius-md);
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--text-primary);
    }

    .dish-item__unit-price {
      font-size: var(--text-xs);
      color: var(--text-muted);
      flex-shrink: 0;
      min-width: 80px;
      text-align: right;
    }

    .dish-item__subtotal {
      font-family: var(--font-display);
      font-size: var(--text-lg);
      color: var(--text-primary);
      flex-shrink: 0;
      min-width: 110px;
      text-align: right;
    }

    /* Summary footer */
    .dishes-footer {
      padding: var(--space-5) var(--space-6);
      border-top: 1px solid var(--border-subtle);
      background: var(--bg-surface);
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-2) 0;
      font-size: var(--text-sm);
      color: var(--text-muted);
    }

    .summary-row--total {
      padding-top: var(--space-4);
      margin-top: var(--space-2);
      border-top: 1px solid var(--border-subtle);
    }

    .summary-row--total .summary-row__label {
      font-size: var(--text-base);
      color: var(--text-primary);
      font-weight: 500;
    }

    .summary-row--total .summary-row__value {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      color: var(--accent-primary);
    }

    /* ── Action Bar ──────────────────────────────────────── */
    .action-bar {
      display: flex;
      gap: var(--space-4);
      align-items: center;
      flex-wrap: wrap;
      animation: slideUp 0.45s ease 0.2s both;
    }

    .action-bar__right { margin-left: auto; display: flex; gap: var(--space-3); }

    /* ── Error / Skeleton states ─────────────────────────── */
    .page-error {
      text-align: center;
      padding: var(--space-20);
    }

    .page-error__code {
      font-family: var(--font-display);
      font-size: 6rem;
      font-weight: 300;
      color: var(--border-active);
      line-height: 1;
    }

    .page-error__msg {
      font-size: var(--text-lg);
      color: var(--text-muted);
      margin-top: var(--space-4);
    }

    .skeleton-block {
      border-radius: var(--radius-lg);
      margin-bottom: var(--space-5);
    }

    /* ── Print styles ────────────────────────────────────── */
    @media print {
      .navbar, .action-bar, .breadcrumb { display: none !important; }
      .detail-page { padding-top: var(--space-6); }
      .detail-page::before { display: none; }
      body { background: white; color: black; }
      .order-header, .dishes-card, .timeline-card {
        box-shadow: none;
        border: 1px solid #ddd;
      }
    }

    @media (max-width: 768px) {
      .order-info-grid { grid-template-columns: 1fr 1fr; }
      .order-title     { font-size: var(--text-2xl); }
      .dish-item__unit-price { display: none; }
      .timeline        { gap: 0; }
      .tl-label        { font-size: 10px; max-width: 60px; }
    }

    @media (max-width: 520px) {
      .order-info-grid { grid-template-columns: 1fr; }
      .dish-item__img  { width: 44px; height: 44px; }
      .action-bar      { flex-direction: column; align-items: stretch; }
      .action-bar__right { margin-left: 0; }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="navbar__brand" style="text-decoration:none">
      <span style="font-size:1.4rem">🌊</span>
      3<span class="accent">T</span>A
    </a>
    <ul class="navbar__nav">
      <li><a href="index.html">Trang chủ</a></li>
      <li><a href="index.html#menu">Thực đơn</a></li>
      <li><a href="profile.html">Tài khoản</a></li>
    </ul>
    <div class="navbar__actions" id="navbar-actions"></div>
  </nav>

  <div class="detail-page">
    <div class="detail-container" id="page-root">
      <!-- Skeleton loader -->
      <div id="skeleton-view">
        <div class="skeleton skeleton-block" style="height:20px;width:260px;margin-bottom:var(--space-8)"></div>
        <div class="skeleton skeleton-block" style="height:200px"></div>
        <div class="skeleton skeleton-block" style="height:100px"></div>
        <div class="skeleton skeleton-block" style="height:320px"></div>
      </div>

      <!-- Main content (hidden until loaded) -->
      <div id="main-view" style="display:none"></div>

      <!-- Error view -->
      <div id="error-view" style="display:none" class="page-error">
        <div class="page-error__code" id="err-code">404</div>
        <div class="page-error__msg" id="err-msg">Không tìm thấy đơn đặt bàn</div>
        <div style="margin-top:var(--space-8);display:flex;gap:var(--space-4);justify-content:center">
          <a href="profile.html" class="btn btn-secondary">← Lịch sử đặt bàn</a>
          <a href="index.html"   class="btn btn-ghost">Trang chủ</a>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container"></div>

  <script type="module">
    import api, { DatBanApi, Auth, Toast, formatPrice, formatDate, getImageUrl } from './apiClient.js';

    // ── Auth guard ─────────────────────────────────────────
    if (!Auth.isLoggedIn()) {
      Toast.error('Vui lòng đăng nhập');
      setTimeout(() => window.location.href = 'login.html', 800);
    }

    // ── Navbar ─────────────────────────────────────────────
    const username = Auth.getUsername() || 'User';
    const initial  = username.charAt(0).toUpperCase();
    document.getElementById('navbar-actions').innerHTML = `
      <div style="display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-4);border-radius:var(--radius-full);border:1px solid var(--border-subtle);font-size:var(--text-sm);color:var(--text-secondary);background:var(--bg-surface)">
        <div style="width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--color-teal),var(--color-wave));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--color-deep)">${initial}</div>
        ${username}
      </div>
      ${Auth.isAdmin() ? `<a href="admin.html" class="btn btn-ghost btn-sm">Admin ↗</a>` : ''}
    `;

    // ── Parse URL param ────────────────────────────────────
    const params   = new URLSearchParams(location.search);
    const datBanId = parseInt(params.get('id'), 10);

    if (!datBanId || isNaN(datBanId)) {
      showError('400', 'Thiếu mã đơn đặt bàn trong URL');
    } else {
      loadDetail(datBanId);
    }

    // ── Load data ──────────────────────────────────────────
    async function loadDetail(id) {
      try {
        // Thử lấy toàn bộ lịch sử rồi filter theo id
        // (thay bằng GET /api/DatBan/{id} nếu backend có)
        let reservation = null;

        if (Auth.isAdmin()) {
          const all = await DatBanApi.getAll();
          reservation = all.find(r => r.id === id);
        } else {
          const history = await DatBanApi.getMyHistory();
          reservation   = history.find(r => r.id === id);
        }

        if (!reservation) { showError('404', 'Không tìm thấy đơn đặt bàn #' + id); return; }

        renderDetail(reservation);
      } catch (err) {
        showError(err.status || '500', err.message || 'Đã xảy ra lỗi khi tải dữ liệu');
      }
    }

    // ── Render ─────────────────────────────────────────────
    function renderDetail(r) {
      const st      = r.trangThai?.toLowerCase() || 'pending';
      const dishes  = r.chiTietDatMon || [];
      const itemCount = dishes.reduce((s, d) => s + (d.soLuong || 1), 0);
      const subtotal  = dishes.reduce((s, d) => s + (d.gia || 0) * (d.soLuong || 1), 0);

      // Status config
      const statusCfg = {
        pending:   { label: 'Chờ xác nhận', badge: 'badge-pending',   icon: '⏳' },
        confirmed: { label: 'Đã xác nhận',  badge: 'badge-confirmed', icon: '✅' },
        paid:      { label: 'Đã thanh toán',badge: 'badge-confirmed', icon: '💳' },
        cancelled: { label: 'Đã hủy',       badge: 'badge-cancelled', icon: '✕'  },
      };
      const cfg = statusCfg[st] || statusCfg.pending;

      // Timeline steps
      const isCancelled = st === 'cancelled';
      const steps = isCancelled
        ? [
            { icon: '📝', label: 'Đặt bàn',  done: true,  active: false },
            { icon: '✕',  label: 'Đã hủy',   done: false, active: true,  cancelled: true },
          ]
        : [
            { icon: '📝', label: 'Đặt bàn',       done: true,              active: false },
            { icon: '⏳', label: 'Chờ xác nhận',   done: ['confirmed','paid'].includes(st), active: st === 'pending' },
            { icon: '✅', label: 'Đã xác nhận',    done: ['paid'].includes(st),             active: st === 'confirmed' },
            { icon: '💳', label: 'Thanh toán',      done: st === 'paid',                     active: false },
          ];

      const timelineHTML = steps.map((s, i) => `
        <div class="tl-step ${s.done ? 'done' : ''} ${s.active ? 'active' : ''} ${s.cancelled ? 'cancelled' : ''}">
          <div class="tl-dot">${s.done ? '✓' : s.cancelled ? '✕' : s.icon}</div>
          <div class="tl-label">${s.label}</div>
        </div>
      `).join('');

      // Dishes rows
      const dishesHTML = dishes.length
        ? dishes.map(d => {
            const name      = d.monAn?.tenMonAn || `Món #${d.monAnId}`;
            const unitPrice = d.gia || 0;
            const qty       = d.soLuong || 1;
            const subtotal  = unitPrice * qty;
            const imgSrc    = d.monAn?.hinhAnh ? getImageUrl(d.monAn.hinhAnh) : null;

            return `
              <div class="dish-item">
                <div class="dish-item__img">
                  ${imgSrc
                    ? `<img src="${imgSrc}" alt="${name}"
                        onerror="this.parentNode.innerHTML='🍜'" />`
                    : '🍜'
                  }
                </div>
                <div class="dish-item__info">
                  <div class="dish-item__name">${name}</div>
                  <div class="dish-item__unit">${formatPrice(unitPrice)} / phần</div>
                </div>
                <div class="dish-item__qty-col">
                  <div class="qty-badge">${qty}</div>
                </div>
                <div class="dish-item__unit-price">${formatPrice(unitPrice)} × ${qty}</div>
                <div class="dish-item__subtotal">${formatPrice(subtotal)}</div>
              </div>
            `;
          }).join('')
        : `<div style="padding:var(--space-10);text-align:center;color:var(--text-muted)">
             <div style="font-size:2.5rem;opacity:.35;margin-bottom:var(--space-3)">🍽️</div>
             <p>Không có thông tin món ăn</p>
           </div>`;

      // Admin actions
      const adminActionsHTML = Auth.isAdmin() && st === 'pending' ? `
        <button class="btn btn-primary" id="btn-confirm-pay">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/>
          </svg>
          Xác nhận thanh toán
        </button>
      ` : '';

      const cancelHTML = (st === 'pending' || st === 'confirmed') ? `
        <button class="btn btn-danger" id="btn-cancel">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
          </svg>
          Hủy đặt bàn
        </button>
      ` : '';

      // Full render
      document.getElementById('main-view').innerHTML = `

        <!-- Breadcrumb -->
        <nav class="breadcrumb">
          <a href="index.html">Trang chủ</a>
          <span class="breadcrumb__sep">›</span>
          <a href="profile.html">Tài khoản</a>
          <span class="breadcrumb__sep">›</span>
          <span class="breadcrumb__current">Đơn #${r.id}</span>
        </nav>

        <!-- Order header -->
        <div class="order-header">
          <div class="order-header__top">
            <div>
              <div class="order-id-wrap">
                <span class="order-id-badge">ĐẶT BÀN #${String(r.id).padStart(5,'0')}</span>
              </div>
              <h1 class="order-title" style="margin-top:var(--space-3)">
                Bàn <em>${r.banAnId}</em>
              </h1>
            </div>
            <div class="order-status-wrap">
              <span class="badge ${cfg.badge}" style="font-size:var(--text-sm);padding:var(--space-2) var(--space-5)">
                ${cfg.icon} ${cfg.label}
              </span>
              <span style="font-size:var(--text-xs);color:var(--text-muted)">${formatDate(r.ngayDat)}</span>
            </div>
          </div>

          <div class="order-info-grid">
            <div class="info-cell">
              <div class="info-cell__label">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
                Ngày đặt
              </div>
              <div class="info-cell__value">${formatDate(r.ngayDat)}</div>
            </div>
            <div class="info-cell">
              <div class="info-cell__label">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M20 9V7a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v2"/><path d="M2 11v5a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-5a2 2 0 0 0-4 0v1H6v-1a2 2 0 0 0-4 0Z"/>
                </svg>
                Số bàn
              </div>
              <div class="info-cell__value">Bàn ${r.banAnId}</div>
            </div>
            <div class="info-cell">
              <div class="info-cell__label">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
                </svg>
                Số món
              </div>
              <div class="info-cell__value">${itemCount} phần</div>
            </div>
            <div class="info-cell">
              <div class="info-cell__label">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                </svg>
                Tổng tiền
              </div>
              <div class="info-cell__value info-cell__value--accent">${formatPrice(subtotal)}</div>
            </div>
          </div>
        </div>

        <!-- Timeline -->
        <div class="timeline-card">
          <div class="timeline-card__title">Tiến trình đơn hàng</div>
          <div class="timeline">${timelineHTML}</div>
        </div>

        <!-- Dishes -->
        <div class="dishes-card">
          <div class="dishes-card__header">
            <h2 class="dishes-card__title">Danh sách món ăn</h2>
            <span class="dishes-card__count">${dishes.length} loại · ${itemCount} phần</span>
          </div>

          ${dishesHTML}

          <div class="dishes-footer">
            <div class="summary-row">
              <span class="summary-row__label">Tạm tính</span>
              <span class="summary-row__value" style="color:var(--text-secondary)">${formatPrice(subtotal)}</span>
            </div>
            <div class="summary-row">
              <span class="summary-row__label">Phí dịch vụ</span>
              <span class="summary-row__value" style="color:var(--status-available)">Miễn phí</span>
            </div>
            <div class="summary-row summary-row--total">
              <span class="summary-row__label">Tổng thanh toán</span>
              <span class="summary-row__value">${formatPrice(subtotal)}</span>
            </div>
          </div>
        </div>

        <!-- Action bar -->
        <div class="action-bar">
          <a href="profile.html" class="btn btn-ghost">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
            </svg>
            Quay lại
          </a>

          <div class="action-bar__right">
            <button class="btn btn-ghost" onclick="window.print()">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/>
              </svg>
              In hóa đơn
            </button>
            ${adminActionsHTML}
            ${cancelHTML}
          </div>
        </div>
      `;

      // Show main, hide skeleton
      document.getElementById('skeleton-view').style.display = 'none';
      document.getElementById('main-view').style.display     = 'block';

      // ── Button events ──────────────────────────────────
      document.getElementById('btn-confirm-pay')?.addEventListener('click', async () => {
        if (!confirm(`Xác nhận thanh toán đơn #${r.id}?`)) return;
        const btn = document.getElementById('btn-confirm-pay');
        btn.disabled = true; btn.innerHTML = '<span class="spinner" style="width:16px;height:16px;border-width:2px"></span> Đang xử lý…';
        try {
          await DatBanApi.confirmPayment({ datBanId: r.id });
          Toast.success('Xác nhận thanh toán thành công!');
          setTimeout(() => loadDetail(r.id), 600);
        } catch (err) {
          Toast.error(err.message || 'Xác nhận thất bại');
          btn.disabled = false;
          btn.innerHTML = '💳 Xác nhận thanh toán';
        }
      });

      document.getElementById('btn-cancel')?.addEventListener('click', async () => {
        if (!confirm(`Xác nhận hủy đơn đặt bàn #${r.id}? Hành động này không thể hoàn tác.`)) return;
        const btn = document.getElementById('btn-cancel');
        btn.disabled = true; btn.textContent = 'Đang hủy…';
        try {
          await DatBanApi.cancel(r.id);
          Toast.success('Đã hủy đặt bàn');
          setTimeout(() => loadDetail(r.id), 600);
        } catch (err) {
          Toast.error(err.message || 'Không thể hủy đơn này');
          btn.disabled = false; btn.textContent = 'Hủy đặt bàn';
        }
      });
    }

    // ── Error state ────────────────────────────────────────
    function showError(code, msg) {
      document.getElementById('skeleton-view').style.display = 'none';
      document.getElementById('err-code').textContent = code;
      document.getElementById('err-msg').textContent  = msg;
      document.getElementById('error-view').style.display = 'block';
    }
  </script>
</body>
</html>
