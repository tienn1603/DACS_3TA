<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3TA — Quản trị</title>
  <link rel="stylesheet" href="css/shared.css" />
  <style>
    body { overflow-x: hidden; }

    /* ── Admin Layout ──────────────────────────────────── */
    .admin-layout {
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar ───────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-width);
      background: rgba(10,22,40,0.95);
      border-right: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 50;
      backdrop-filter: blur(20px);
      transition: transform var(--transition-slow);
    }

    .sidebar__logo {
      padding: var(--space-6) var(--space-6) var(--space-5);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .sidebar__logo-mark {
      width: 40px; height: 40px;
      border-radius: var(--radius-md);
      background: linear-gradient(135deg, var(--color-ocean), var(--color-teal));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .sidebar__logo-text {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      font-weight: 600;
      letter-spacing: 0.12em;
    }

    .sidebar__logo-text span { color: var(--accent-primary); }

    .sidebar__badge {
      font-size: var(--text-xs);
      background: rgba(42,171,184,0.12);
      color: var(--accent-primary);
      border: 1px solid var(--border-active);
      border-radius: var(--radius-full);
      padding: 2px 8px;
      margin-left: auto;
    }

    .sidebar__nav {
      flex: 1;
      padding: var(--space-5) var(--space-4);
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
      overflow-y: auto;
    }

    .sidebar__section-label {
      font-size: var(--text-xs);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: var(--space-4) var(--space-3) var(--space-2);
    }

    .sidebar__item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-md);
      color: var(--text-muted);
      font-size: var(--text-sm);
      cursor: pointer;
      transition: all var(--transition-fast);
      border: 1px solid transparent;
      user-select: none;
    }

    .sidebar__item:hover {
      background: var(--bg-surface);
      color: var(--text-primary);
    }

    .sidebar__item.active {
      background: rgba(42,171,184,0.1);
      color: var(--accent-primary);
      border-color: var(--border-active);
    }

    .sidebar__item__icon {
      font-size: 1.05rem;
      flex-shrink: 0;
    }

    .sidebar__item__badge {
      margin-left: auto;
      background: var(--status-reserved);
      color: white;
      border-radius: var(--radius-full);
      padding: 1px 7px;
      font-size: 10px;
      font-weight: 700;
    }

    .sidebar__footer {
      padding: var(--space-5) var(--space-6);
      border-top: 1px solid var(--border-subtle);
    }

    .admin-user {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .admin-user__avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--color-teal), var(--color-wave));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: var(--text-sm);
      color: var(--color-deep);
      flex-shrink: 0;
    }

    .admin-user__name { font-size: var(--text-sm); font-weight: 500; color: var(--text-primary); }
    .admin-user__role { font-size: var(--text-xs); color: var(--text-muted); }

    /* ── Main Content ──────────────────────────────────── */
    .admin-main {
      margin-left: var(--sidebar-width);
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Top Bar ───────────────────────────────────────── */
    .topbar {
      height: var(--navbar-height);
      background: rgba(10,22,40,0.8);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      padding: 0 var(--space-8);
      gap: var(--space-4);
      position: sticky;
      top: 0;
      z-index: 40;
    }

    .topbar__title {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      font-weight: 400;
    }

    .topbar__title span { font-style: italic; color: var(--accent-primary); }

    .topbar__actions { margin-left: auto; display: flex; align-items: center; gap: var(--space-3); }

    /* ── Panels ────────────────────────────────────────── */
    .admin-panel {
      display: none;
      padding: var(--space-8);
      animation: fadeIn 0.3s ease;
    }

    .admin-panel.active { display: block; }

    /* ── Stats Cards ───────────────────────────────────── */
    .stat-cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-5);
      margin-bottom: var(--space-8);
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: var(--space-5) var(--space-6);
      position: relative;
      overflow: hidden;
      transition: all var(--transition-base);
    }

    .stat-card:hover {
      border-color: var(--border-active);
      transform: translateY(-2px);
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }

    .stat-card.blue::before   { background: linear-gradient(90deg, var(--color-teal), var(--color-wave)); }
    .stat-card.green::before  { background: linear-gradient(90deg, var(--status-available), #2ecc71); }
    .stat-card.orange::before { background: linear-gradient(90deg, var(--status-reserved), #f39c12); }
    .stat-card.red::before    { background: linear-gradient(90deg, var(--status-occupied), #c0392b); }

    .stat-card__icon { font-size: 1.8rem; margin-bottom: var(--space-3); }
    .stat-card__num  { font-family: var(--font-display); font-size: var(--text-3xl); font-weight: 600; color: var(--text-primary); line-height: 1; }
    .stat-card__label { font-size: var(--text-xs); letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-top: var(--space-2); }

    /* ── Table Management Grid ─────────────────────────── */
    .banan-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: var(--space-4);
    }

    .banan-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      text-align: center;
      transition: all var(--transition-base);
      cursor: pointer;
      position: relative;
    }

    .banan-card:hover {
      border-color: var(--border-active);
      box-shadow: var(--shadow-glow);
    }

    .banan-card__num {
      font-family: var(--font-display);
      font-size: var(--text-3xl);
      font-weight: 600;
      line-height: 1.1;
      margin-bottom: var(--space-2);
    }

    .banan-card__seats {
      font-size: var(--text-xs);
      color: var(--text-muted);
      margin-bottom: var(--space-3);
    }

    .banan-card.available { border-color: rgba(46,204,138,0.2); }
    .banan-card.available .banan-card__num { color: var(--status-available); }
    .banan-card.occupied  { border-color: rgba(224,92,92,0.2); }
    .banan-card.occupied  .banan-card__num { color: var(--status-occupied); }
    .banan-card.reserved  { border-color: rgba(245,166,35,0.2); }
    .banan-card.reserved  .banan-card__num { color: var(--status-reserved); }

    /* ── Reservation filters ───────────────────────────── */
    .filter-bar {
      display: flex;
      gap: var(--space-3);
      margin-bottom: var(--space-6);
      flex-wrap: wrap;
    }

    .filter-chip {
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-full);
      border: 1px solid var(--border-subtle);
      background: transparent;
      color: var(--text-muted);
      font-size: var(--text-xs);
      font-family: var(--font-body);
      cursor: pointer;
      transition: all var(--transition-fast);
      letter-spacing: 0.04em;
    }

    .filter-chip:hover { border-color: var(--accent-primary); color: var(--accent-primary); }
    .filter-chip.active { background: rgba(42,171,184,0.12); border-color: var(--border-active); color: var(--accent-primary); }

    /* ── Status Change Buttons in Table ────────────────── */
    .status-select {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-family: var(--font-body);
      font-size: var(--text-xs);
      padding: var(--space-1) var(--space-3);
      cursor: pointer;
      outline: none;
    }

    .status-select:focus { border-color: var(--accent-primary); }

    /* ── Mobile sidebar toggle ─────────────────────────── */
    .sidebar-toggle {
      display: none;
      width: 36px; height: 36px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-subtle);
      background: var(--bg-surface);
      color: var(--text-primary);
      cursor: pointer;
      align-items: center;
      justify-content: center;
    }

    @media (max-width: 1024px) {
      .stat-cards { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
      }
      .sidebar.open { transform: translateX(0); }
      .admin-main { margin-left: 0; }
      .sidebar-toggle { display: flex; }
      .stat-cards { grid-template-columns: 1fr 1fr; }
      .admin-panel { padding: var(--space-5); }
    }

    /* ══════════════════════════════════════════════════════════
       ĐẶT BÀN — Quản lý đặt bàn
       ══════════════════════════════════════════════════════════ */

    /* ── Section header ────────────────────────────── */
    .db-section-header {
      margin-bottom: var(--space-6);
    }

    .db-section-title__main {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.2;
      margin: 0;
    }

    .db-section-title__sub {
      font-size: var(--text-sm);
      color: var(--text-muted);
      margin: var(--space-1) 0 0;
    }

    /* ── Toolbar + Filter chips ─────────────────────── */
    .db-toolbar {
      margin-bottom: var(--space-5);
    }

    .db-filter {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
    }

    .db-filter__chip {
      padding: 6px 16px;
      border-radius: var(--radius-full);
      border: 1px solid var(--border-subtle);
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: var(--text-xs);
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .db-filter__chip:hover {
      border-color: var(--accent-primary);
      color: var(--accent-primary);
      background: rgba(42, 171, 184, 0.06);
    }

    .db-filter__chip.active {
      background: rgba(42, 171, 184, 0.14);
      border-color: var(--border-active);
      color: var(--accent-primary);
    }

    /* ── Table wrapper ──────────────────────────────── */
    .db-table-wrap {
      overflow-x: auto;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-subtle);
      background: var(--bg-card);
    }

    /* ── Table ──────────────────────────────────────── */
    .db-table {
      width: 100%;
      border-collapse: collapse;
      font-size: var(--text-sm);
    }

    .db-table thead {
      background: var(--bg-surface);
    }

    .db-table th {
      padding: var(--space-4) var(--space-5);
      text-align: left;
      font-size: var(--text-xs);
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border-subtle);
      white-space: nowrap;
    }

    .db-table td {
      padding: var(--space-4) var(--space-5);
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border-subtle);
      vertical-align: middle;
    }

    .db-table tbody tr:last-child td { border-bottom: none; }

    .db-table tbody tr {
      transition: background var(--transition-fast);
    }

    .db-table tbody tr:hover {
      background: rgba(42, 171, 184, 0.04);
    }

    /* ── Cell variants ──────────────────────────────── */
    .db-td--id {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--text-muted);
      white-space: nowrap;
    }

    .db-td--name {
      max-width: 200px;
    }

    .db-td--center {
      text-align: center;
    }

    /* Truncation helpers */
    .db-cell-truncate {
      display: block;
      font-weight: 500;
      color: var(--text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
    }

    .db-cell-muted {
      display: block;
      font-size: var(--text-xs);
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Actions cell ──────────────────────────────── */
    .db-actions {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      flex-wrap: wrap;
    }

    /* ── Status badge variants ─────────────────────── */
    .badge.badge-expired   { color: var(--text-muted)        !important; background: rgba(200, 234, 237, 0.06) !important; }
    .badge.badge-completed { color: var(--status-available)   !important; background: rgba(46, 204, 138, 0.12) !important; }

    /* ── Success button (thanh toán) ─────────────── */
    .btn-success {
      background: rgba(46, 204, 138, 0.12);
      color: #2ecc8a;
      border: 1px solid rgba(46, 204, 138, 0.3);
      border-radius: var(--radius-md);
      padding: var(--space-2) var(--space-4);
      font-family: var(--font-body);
      font-size: var(--text-xs);
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition-fast);
      display: inline-flex;
      align-items: center;
    }

    .btn-success:hover {
      background: rgba(46, 204, 138, 0.22);
      border-color: rgba(46, 204, 138, 0.6);
    }

    /* ── Responsive ───────────────────────────────── */
    @media (max-width: 768px) {
      .db-filter__chip {
        padding: 5px 12px;
        font-size: 0.7rem;
      }
      .db-table th,
      .db-table td {
        padding: var(--space-3) var(--space-4);
      }
    }
  </style>
</head>
<body>

<div class="admin-layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__logo">
      <div class="sidebar__logo-mark">🌊</div>
      <div class="sidebar__logo-text">3<span>T</span>A</div>
      <span class="sidebar__badge">Admin</span>
    </div>

    <ul class="sidebar__nav">
      <li class="sidebar__section-label">Tổng quan</li>
      <li class="sidebar__item active" data-panel="dashboard">
        <span class="sidebar__item__icon">📊</span>
        Dashboard
      </li>

      <li class="sidebar__section-label">Quản lý</li>
      <li class="sidebar__item" data-panel="monan">
        <span class="sidebar__item__icon">🍽️</span>
        Món ăn
      </li>
      <li class="sidebar__item" data-panel="banan">
        <span class="sidebar__item__icon">🪑</span>
        Bàn ăn
      </li>
      <li class="sidebar__item" data-panel="datban">
        <span class="sidebar__item__icon">📋</span>
        Đặt bàn
        <span class="sidebar__item__badge" id="pending-badge" style="display:none">0</span>
      </li>

      <li class="sidebar__section-label">Hệ thống</li>
      <li class="sidebar__item" id="sidebar-logout">
        <span class="sidebar__item__icon">🚪</span>
        Đăng xuất
      </li>
      <li class="sidebar__item" onclick="window.open('index.html','_blank')">
        <span class="sidebar__item__icon">🌐</span>
        Xem trang chủ ↗
      </li>
    </ul>

    <div class="sidebar__footer">
      <div class="admin-user">
        <div class="admin-user__avatar" id="admin-avatar">A</div>
        <div>
          <div class="admin-user__name" id="admin-name">Admin</div>
          <div class="admin-user__role">Quản trị viên</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="admin-main">

    <!-- Topbar -->
    <div class="topbar">
      <button class="sidebar-toggle" id="sidebar-toggle">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <h1 class="topbar__title" id="topbar-title">Dashboard <span>tổng quan</span></h1>
      <div class="topbar__actions">
        <button class="btn btn-ghost btn-sm" id="btn-refresh">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
          Làm mới
        </button>
      </div>
    </div>

    <!-- ── Dashboard Panel ─────────────────────────────── -->
    <div class="admin-panel active" id="panel-dashboard">
      <div class="stat-cards" id="stat-cards">
        <div class="stat-card blue skeleton" style="height:120px"></div>
        <div class="stat-card green skeleton" style="height:120px"></div>
        <div class="stat-card orange skeleton" style="height:120px"></div>
        <div class="stat-card red skeleton" style="height:120px"></div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-6)">
        <!-- Recent reservations -->
        <div class="card" style="padding:var(--space-6)">
          <h3 style="font-family:var(--font-display);font-size:var(--text-lg);margin-bottom:var(--space-5)">
            Đặt bàn gần đây
          </h3>
          <div id="dash-recent"></div>
        </div>

        <!-- Table status overview -->
        <div class="card" style="padding:var(--space-6)">
          <h3 style="font-family:var(--font-display);font-size:var(--text-lg);margin-bottom:var(--space-5)">
            Trạng thái bàn
          </h3>
          <div id="dash-tables"></div>
        </div>
      </div>
    </div>

    <!-- ── Món Ăn Panel ────────────────────────────────── -->
    <div class="admin-panel" id="panel-monan">
      <div id="monan-root"></div>
    </div>

    <!-- ── Bàn Ăn Panel ───────────────────────────────── -->
    <div class="admin-panel" id="panel-banan">
      <div id="banan-root"></div>
    </div>

    <!-- ── Đặt Bàn Panel ──────────────────────────────── -->
    <div class="admin-panel" id="panel-datban">
      <div id="datban-root"></div>
    </div>

  </main>
</div>

<!-- Table Edit Modal -->
<div class="modal-overlay" id="banan-modal" style="display:none">
  <div class="modal" style="max-width:400px">
    <div class="modal__header">
      <h3 class="modal__title">Cập nhật bàn ăn</h3>
      <button class="modal__close" id="banan-modal-close">✕</button>
    </div>
    <div id="banan-modal-body"></div>
  </div>
</div>

<div class="toast-container"></div>

<script type="module">
    import { Auth } from './js/services/authService.js';
    import api, { MonAnApi, BanAnApi, DatBanApi, Toast, formatPrice, formatDate } from './js/apiClient.js';
  import MonAnComponent from './components/MonAnComponent.js';
  import BanAnComponent from './components/BanAnComponent.js';
  import DatBanComponent from './components/DatBanComponent.js';

  // Auth guard
  if (!Auth.isLoggedIn() || !Auth.isAdmin()) {
    Toast.error('Bạn không có quyền truy cập trang này');
    setTimeout(() => window.location.href = 'login.html', 1000);
  }

  // ── User info ────────────────────────────────────────
  const username = Auth.getUsername() || 'Admin';
  document.getElementById('admin-name').textContent = username;
  document.getElementById('admin-avatar').textContent = username.charAt(0).toUpperCase();

  // ── Sidebar navigation ───────────────────────────────
  const titleMap = {
    dashboard: 'Dashboard <span>tổng quan</span>',
    monan:     'Quản lý <span>Món ăn</span>',
    banan:     'Quản lý <span>Bàn ăn</span>',
    datban:    'Quản lý <span>Đặt bàn</span>',
  };

  document.querySelectorAll('.sidebar__item[data-panel]').forEach(item => {
    item.addEventListener('click', () => {
      const panel = item.dataset.panel;
      document.querySelectorAll('.sidebar__item').forEach(i => i.classList.remove('active'));
      document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
      item.classList.add('active');
      document.getElementById(`panel-${panel}`).classList.add('active');
      document.getElementById('topbar-title').innerHTML = titleMap[panel] || panel;

      // Init component lazily (once per panel)
      if (panel === 'monan')  getMonAnComp().init();
      if (panel === 'banan')  getBanAnComp().init();
      if (panel === 'datban') getDatBanComp().init();
    });
  });

  // Refresh button — reload active component + dashboard
  document.getElementById('btn-refresh').addEventListener('click', () => {
    loadDashboard();
    const activeId = document.querySelector('.admin-panel.active')?.id;
    if (activeId === 'panel-monan')  getMonAnComp().reload();
    if (activeId === 'panel-banan')  getBanAnComp().reload();
    if (activeId === 'panel-datban') getDatBanComp().reload();
    Toast.info('Đã làm mới dữ liệu');
  });

  // ── Mobile sidebar ────────────────────────────────────────
  const sidebar = document.getElementById('sidebar');
  document.getElementById('sidebar-toggle').addEventListener('click', () => {
    sidebar.classList.toggle('open');
  });
  document.addEventListener('click', e => {
    if (!sidebar.contains(e.target) && !document.getElementById('sidebar-toggle').contains(e.target)) {
      sidebar.classList.remove('open');
    }
  });

  // Logout
  document.getElementById('sidebar-logout').addEventListener('click', () => {
    Auth.clear();
    window.location.href = 'login.html';
  });

  // ── Component instances ───────────────────────────────────
  let monAnComp  = null;
  let banAnComp  = null;
  let datBanComp = null;

  function getMonAnComp() {
    if (!monAnComp) monAnComp = new MonAnComponent('#monan-root', { admin: true });
    return monAnComp;
  }
  function getBanAnComp() {
    if (!banAnComp) banAnComp = new BanAnComponent('#banan-root');
    return banAnComp;
  }
  function getDatBanComp() {
    if (!datBanComp) datBanComp = new DatBanComponent('#datban-root', { admin: true });
    return datBanComp;
  }

  // ── Init ─────────────────────────────────────────────
  async function loadDashboard() {
    try {
      const [tables, reservations] = await Promise.all([
        BanAnApi.getAll().catch(() => []),
        DatBanApi.getAll().catch(() => []),
      ]);

      // trangThai: 0=Available, 1=Occupied, 2=Reserved
      const available = tables.filter(t => t.TrangThai === 0).length;
      const occupied  = tables.filter(t => t.TrangThai === 1).length;
      const reserved  = tables.filter(t => t.TrangThai === 2).length;
      // trangThai: 0=Pending, 1=Confirmed, -1=Cancelled, 3=Expired
      const pending   = reservations.filter(r => r.TrangThai === 0).length;

      const badge = document.getElementById('pending-badge');
      badge.textContent = pending;
      badge.style.display = pending > 0 ? 'inline' : 'none';

      document.getElementById('stat-cards').innerHTML = `
        <div class="stat-card blue">
          <div class="stat-card__icon">🪑</div>
          <div class="stat-card__num">${tables.length}</div>
          <div class="stat-card__label">Tổng số bàn</div>
        </div>
        <div class="stat-card green">
          <div class="stat-card__icon">✅</div>
          <div class="stat-card__num">${available}</div>
          <div class="stat-card__label">Bàn trống</div>
        </div>
        <div class="stat-card orange">
          <div class="stat-card__icon">⏳</div>
          <div class="stat-card__num">${pending}</div>
          <div class="stat-card__label">Chờ xác nhận</div>
        </div>
        <div class="stat-card red">
          <div class="stat-card__icon">🔥</div>
          <div class="stat-card__num">${occupied + reserved}</div>
          <div class="stat-card__label">Bàn đang dùng</div>
        </div>
      `;

      const recent = [...reservations].slice(0, 5);
      const badgeMap = { 0:'badge-pending', 1:'badge-confirmed', 2:'badge-reserved', 3:'badge-reserved', '-1':'badge-cancelled' };
      const labelMap = { 0:'Chờ xác nhận', 1:'Đã xác nhận', 2:'Đã đặt', 3:'Hết hạn', '-1':'Đã hủy' };

      document.getElementById('dash-recent').innerHTML = recent.length
        ? recent.map(r => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:var(--space-3) 0;border-bottom:1px solid var(--border-subtle)">
              <div>
                <div style="font-size:var(--text-sm);color:var(--text-primary)">#${r.Id ?? r.id} — Bàn ${r.BanAnId ?? r.banAnId}</div>
                <div style="font-size:var(--text-xs);color:var(--text-muted)">${formatDate(r.NgayDat ?? r.ngayDat)}</div>
              </div>
              <span class="badge ${badgeMap[r.TrangThai ?? r.trangThai] || 'badge-pending'}">
                ${labelMap[r.TrangThai ?? r.trangThai] || (r.TrangThai ?? r.trangThai)}
              </span>
            </div>
          `).join('')
        : '<p style="color:var(--text-muted);font-size:var(--text-sm)">Chưa có đặt bàn nào</p>';

      const totalNonAvail = occupied + reserved;
      const statuses = [
        { label: 'Trống',     count: available,                   color: 'var(--status-available)' },
        { label: 'Đang dùng',count: occupied,                   color: 'var(--status-occupied)'  },
        { label: 'Đã đặt',   count: reserved,                   color: 'var(--status-reserved)'  },
      ];

      document.getElementById('dash-tables').innerHTML = `
        ${statuses.map(s => {
          const pct = tables.length > 0 ? Math.round(s.count / tables.length * 100) : 0;
          return `
          <div style="display:flex;align-items:center;gap:var(--space-4);padding:var(--space-4) 0;border-bottom:1px solid var(--border-subtle)">
            <div style="width:42px;height:42px;border-radius:var(--radius-md);background:rgba(0,0,0,0.2);border:2px solid ${s.color};display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:var(--text-lg);font-weight:600;color:${s.color};flex-shrink:0">${s.count}</div>
            <div>
              <div style="font-size:var(--text-sm);color:var(--text-primary)">${s.label}</div>
              <div style="font-size:var(--text-xs);color:var(--text-muted)">${pct}% tổng số bàn</div>
            </div>
            <div style="margin-left:auto;height:4px;flex:1;max-width:80px;background:var(--bg-surface);border-radius:var(--radius-full);overflow:hidden">
              <div style="height:100%;width:${pct}%;background:${s.color};border-radius:var(--radius-full)"></div>
            </div>
          </div>`;}).join('')}
      `;

    } catch (err) {
      console.error('Dashboard error:', err);
    }
  }

  // ── Init ─────────────────────────────────────────────
  loadDashboard();
</script>
</body>
</html>
